amcl:
  ros__parameters:
    use_sim_time: true

    base_frame_id: base_footprint
    odom_frame_id: odom
    global_frame_id: map

    scan_topic: scan

    min_particles: 300
    max_particles: 1500

    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    update_min_d: 0.2
    update_min_a: 0.2

    laser_model_type: likelihood_field

    transform_tolerance: 1.0

    set_initial_pose: false
